<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background subtle gradient -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>
  
  <!-- Stylized graduation cap & book -->
  <rect x="15" y="25" width="70" height="55" rx="10" fill="url(#blueGrad)" opacity="0.1" />
  
  <!-- Main Icon Elements -->
  <!-- Book Spine/Base -->
  <path d="M 25 70 C 35 60, 50 60, 50 70 C 50 60, 65 60, 75 70 L 75 40 C 65 30, 50 30, 50 40 C 50 30, 35 30, 25 40 Z" fill="none" stroke="url(#blueGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 50 40 L 50 70" fill="none" stroke="url(#blueGrad)" stroke-width="5" stroke-linecap="round" />
  
  <!-- Graduation Cap outline on top -->
  <polygon points="50,15 75,25 50,35 25,25" fill="url(#blueGrad)" />
  <path d="M 35 29 L 35 45 C 35 48, 50 52, 50 52 C 50 52, 65 48, 65 45 L 65 29" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" />
  <path d="M 70 25 L 75 35 L 75 48" fill="none" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round" />
  <circle cx="75" cy="48" r="2.5" fill="url(#blueGrad)" />
</svg>
