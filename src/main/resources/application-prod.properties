# Produktions-Konfiguration (Profil 'prod')

# H2 Datenbank-Konfiguration (Standard-Fallback)
spring.datasource.url=jdbc:h2:file:/var/lib/maintenance-tool/storage/maintenancedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- Ehemals aktiver MS SQL Server (auskommentiert) ---
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=maintenancedb;encrypt=true;trustServerCertificate=true
# spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
# spring.datasource.username=maintenance_app
# spring.datasource.password=PROD_SECRET_PASSWORD

# JPA/Hibernate-Einstellungen für Produktion (Auto-detect für H2)
# spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Liquibase in Produktion aktivieren
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Echter SMTP E-Mail-Versand in Produktion
spring.mail.host=smtp.meinefirma.de
spring.mail.port=587
spring.mail.username=maintenance@meinefirma.de
spring.mail.password=SMTP_SECRET_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Dateispeicherpfad auf dem Produktionsserver (muss absolut sein)
app.file-storage.path=/var/lib/maintenance-tool/storage

# Sicherheits-Modus konfigurieren (z.B. SAML2 oder LDAP)
app.security.auth-method=SAML2

