# Entwicklungs-Konfiguration (Profil 'dev')

# H2 File-Based Datenbank (persistent)
spring.datasource.url=jdbc:h2:file:./storage/maintenancedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=


# H2 Console aktivieren (unter /h2-console erreichbar)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate-Einstellungen für Entwicklung
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Liquibase im Entwicklungsmodus aktivieren
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Mock-Mail-Sender (Mails werden auf die Konsole geschrieben statt echtem SMTP)
# spring.mail.host=localhost
# spring.mail.port=25
# Wir können einen Mock-E-Mail-Service im Dev-Profil registrieren, der diese properties ignoriert und ins Log schreibt

# LDAP-Konfiguration für die lokale Entwicklung (UnboundID In-Memory)
# Der eingebettete LDAP-Server von Spring Security lauscht lokal auf Port 8389
spring.ldap.urls=ldap://localhost:8389
spring.ldap.base=dc=maintenancetool,dc=de
spring.ldap.username=cn=admin,dc=maintenancetool,dc=de
spring.ldap.password=adminsecret

# Konfiguration des eingebetteten LDAP-Servers (Spring Security)
spring.ldap.embedded.port=8389
spring.ldap.embedded.ldif=classpath:users.ldif
spring.ldap.embedded.base-dn=dc=maintenancetool,dc=de

# Konfiguration des aktiven Sicherheits-Modus im Dev-Profil
# (Mögliche Werte: SAML2, LDAP)
app.security.auth-method=LDAP
