# Standard-Profil für den Betrieb auf Produktion setzen
spring.profiles.active=prod

# Optionale externe Konfigurationsdatei für Sysadmins importieren (überschreibt Standardwerte)
spring.config.import=optional:file:./maintenance-tool.properties,optional:file:/etc/maintenance-tool/maintenance-tool.properties


# Anwendungs-Metadaten
spring.application.name=maintenance-tool

# Servlet & Server-Port
server.port=8080

# Dateispeicherpfad für Dokumente (Konfigurierbar, hier als Standard im Projektordner)
app.file-storage.path=${user.dir}/storage

# Branding / Corporate Identity Standardwerte (können überschrieben werden)
app.branding.company-name=Meine Firma GmbH
app.branding.logo-path=/assets/default-logo.svg
app.branding.theme-color=#3b82f6
app.branding.theme-color-hover=#2563eb

# JPA/Hibernate: Open Session in View (OSIV) deaktivieren für bessere Performance und Ressourcenschonung
spring.jpa.open-in-view=false

# Virtuelle Threads (Project Loom) aktivieren für hocheffiziente Concurrent-Request-Verarbeitung
spring.threads.virtual.enabled=true

